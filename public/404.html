<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>1941–1945</title>
    <script>
      // SPA-fallback for GitHub Pages: deep links like /event/3 must boot
      // from /index.html. Save the original path so React Router can pick it up.
      var path = window.location.pathname;
      var search = window.location.search;
      if (path !== '/') {
        sessionStorage.setItem('redirect', path.slice(1) + search);
      }
      window.location.replace('/');
    </script>
  </head>
  <body></body>
</html>
