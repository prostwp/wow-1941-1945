<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>1941–1945</title>
    <script>
      // SPA-fallback for GitHub Pages: redirect any deep link to / with hash
      // so React Router can pick it up.
      var path = window.location.pathname;
      var base = '/wow-1941-1945/';
      if (path.indexOf(base) === 0) {
        var rest = path.slice(base.length);
        var search = window.location.search;
        sessionStorage.setItem('redirect', rest + search);
        window.location.replace(base);
      } else {
        window.location.replace(base);
      }
    </script>
  </head>
  <body></body>
</html>
